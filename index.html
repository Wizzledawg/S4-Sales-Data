<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1RB9rxbcQ5B4RAIuXxymZKD64hRhdsWw1-SuN6GyEG_4/export?format=csv&gid=1907582977";

const fmtMoney = n => new Intl.NumberFormat('en-ZA', {
  style: 'currency', currency: 'ZAR', maximumFractionDigits: 0
}).format(Number(n || 0));

const fmtPct = n => isNaN(n) ? '—' : (n * 100).toFixed(1) + '%';

function clean(v) {
  if (!v) return 0;
  let t = String(v).replace(/R|,|\s/g, '');
  if (t.includes('%')) return parseFloat(t)/100 || 0;
  return parseFloat(t) || 0;
}

async function loadDashboard() {
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await res.text();

    const rows = text.split('\n').map(r => r.split(','));

    // adjust indexes if needed
    const data = rows.slice(5, 30).map(r => ({
      name: r[1],
      actual: clean(r[7]),
      target: clean(r[8]),
      pct: clean(r[9])
    })).filter(r => r.name);

    const total = data.reduce((s,r)=>s+r.actual,0);
    const target = data.reduce((s,r)=>s+r.target,0);
    const best = [...data].sort((a,b)=>b.pct-a.pct)[0];

    document.getElementById('kpiTotal').textContent = fmtMoney(total);
    document.getElementById('kpiTarget').textContent = fmtMoney(target);
    document.getElementById('kpiGap').textContent = fmtMoney(target-total);
    document.getElementById('kpiBest').textContent = best?.name || '—';
    document.getElementById('kpiBestSub').textContent = fmtPct(best?.pct);
    document.getElementById('kpiActive').textContent = data.filter(x=>x.actual>0).length;

    document.getElementById('leaderboardBody').innerHTML =
      data.sort((a,b)=>b.actual-a.actual).map((r,i)=>`
        <tr>
          <td>${i+1}</td>
          <td>${r.name}</td>
          <td>${fmtMoney(r.actual)}</td>
          <td>${fmtMoney(r.target)}</td>
          <td>${fmtPct(r.pct)}</td>
          <td>${r.pct>=1?'Over target':r.pct>=0.6?'On track':r.pct>0?'Build':'Start'}</td>
        </tr>
      `).join('');

  } catch (e) {
    document.body.innerHTML = "Error loading sheet";
    console.error(e);
  }
}

loadDashboard();
</script>
